name: Auto Release

on:
  push:
    branches:
      - main

jobs:
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check commit message
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "Commit message: $COMMIT_MSG"
          # 「🚀：Version~.~.~ -> Version~.~.~」パターンを検出
          if echo "$COMMIT_MSG" | grep -qP '🚀：Version\d+\.\d+\.\d+ -> Version\d+\.\d+\.\d+'; then
            VERSION=$(echo "$COMMIT_MSG" | grep -oP '-> Version\K\d+\.\d+\.\d+')
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Detected release version: $VERSION"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No release trigger found."
          fi

  build:
    needs: check-commit
    if: needs.check-commit.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: dm
            archive: dm-linux-x86_64.tar.gz
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            artifact: dm.exe
            archive: dm-windows-x86_64.zip
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: dm
            archive: dm-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: dm
            archive: dm-macos-aarch64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile deps (Linux → Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Install musl tools (Linux musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Archive (tar.gz)
        if: ${{ !endsWith(matrix.archive, '.zip') }}
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
          tar czf ${{ matrix.archive }} -C dist .

      - name: Archive (zip)
        if: endsWith(matrix.archive, '.zip')
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
          cd dist && zip ../${{ matrix.archive }} *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: [check-commit, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.check-commit.outputs.version }}"
          git push origin "v${{ needs.check-commit.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.check-commit.outputs.version }}
          name: v${{ needs.check-commit.outputs.version }}
          body: ${{ github.event.head_commit.message }}
          files: dist/*
